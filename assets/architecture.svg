<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace">
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Left Box: Hermes Server -->
  <rect x="20" y="20" width="380" height="380" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="40" y="48" fill="#58a6ff" font-size="16" font-weight="bold">Hermes Server (Source)</text>

  <!-- Hermes Config -->
  <rect x="40" y="65" width="340" height="195" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="210" y="88" fill="#c9d1d9" font-size="13" text-anchor="middle" font-weight="bold">~/.hermes/ Directory</text>

  <text x="55" y="112" fill="#3fb950" font-size="12">├── config.yaml</text>
  <text x="75" y="130" fill="#8b949e" font-size="11">Provider settings, tools, integrations</text>

  <text x="55" y="150" fill="#f0883e" font-size="12">├── .env</text>
  <text x="75" y="168" fill="#8b949e" font-size="11">API keys and secrets</text>

  <text x="55" y="188" fill="#f0883e" font-size="12">├── auth.json</text>
  <text x="75" y="206" fill="#8b949e" font-size="11">OAuth tokens</text>

  <text x="55" y="226" fill="#c9d1d9" font-size="12">├── state.db</text>
  <text x="75" y="244" fill="#8b949e" font-size="11">Session database (conversation history)</text>

  <text x="55" y="256" fill="#c9d1d9" font-size="12">├── skills/ ├── cron/ ├── mnemosyne/</text>

  <!-- Hermes Source -->
  <rect x="40" y="275" width="340" height="50" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="55" y="298" fill="#c9d1d9" font-size="12">/usr/local/lib/hermes-agent/</text>
  <text x="55" y="315" fill="#8b949e" font-size="11">Hermes source code (for full recovery)</text>

  <!-- Backup Script -->
  <rect x="40" y="335" width="340" height="50" rx="6" fill="#1c2128" stroke="#d2a8ff"/>
  <text x="55" y="355" fill="#d2a8ff" font-size="12">~/.hermes/scripts/hermes-backup.sh</text>
  <text x="55" y="372" fill="#8b949e" font-size="11">Runs daily at 3 AM via cron or system cron</text>

  <!-- Arrow Hermes → VPS -->
  <line x1="400" y1="200" x2="480" y2="200" stroke="#30363d" stroke-width="3"/>
  <polygon points="475,192 490,200 475,208" fill="#3fb950"/>

  <!-- rsync label -->
  <rect x="405" y="150" width="80" height="40" rx="6" fill="#1c2128" stroke="#3fb950"/>
  <text x="445" y="168" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">rsync</text>
  <text x="445" y="183" fill="#8b949e" font-size="10" text-anchor="middle">over SSH</text>

  <!-- Incremental label -->
  <text x="445" y="225" fill="#8b949e" font-size="11" text-anchor="middle">⬇ incremental</text>
  <text x="445" y="240" fill="#8b949e" font-size="11" text-anchor="middle">⬆ full restore</text>

  <!-- Right Box: Backup VPS -->
  <rect x="500" y="20" width="380" height="380" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="520" y="48" fill="#f0883e" font-size="16" font-weight="bold">Backup VPS (Destination)</text>

  <!-- Backup structure -->
  <rect x="520" y="65" width="340" height="195" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="690" y="88" fill="#c9d1d9" font-size="13" text-anchor="middle" font-weight="bold">/root/backups/backup-hermes/</text>

  <text x="535" y="112" fill="#3fb950" font-size="12">└── &lt;server-name&gt;/</text>
  <text x="555" y="132" fill="#c9d1d9" font-size="12">├── config.yaml</text>
  <text x="555" y="152" fill="#c9d1d9" font-size="12">├── .env</text>
  <text x="555" y="172" fill="#c9d1d9" font-size="12">├── auth.json</text>
  <text x="555" y="192" fill="#c9d1d9" font-size="12">├── state.db</text>
  <text x="555" y="212" fill="#c9d1d9" font-size="12">├── skills/</text>
  <text x="555" y="232" fill="#c9d1d9" font-size="12">├── sessions/</text>
  <text x="555" y="252" fill="#c9d1d9" font-size="12">├── hermes-src/</text>

  <!-- Multiple servers -->
  <rect x="520" y="275" width="340" height="110" rx="8" fill="#1c2128" stroke="#d2a8ff"/>
  <text x="690" y="298" fill="#d2a8ff" font-size="13" text-anchor="middle" font-weight="bold">Multiple Hermes, One VPS</text>
  <text x="535" y="320" fill="#c9d1d9" font-size="12">/root/backups/backup-hermes/</text>
  <text x="555" y="340" fill="#8b949e" font-size="12">├── production/  # Main server</text>
  <text x="555" y="358" fill="#8b949e" font-size="12">├── staging/     # Test env</text>
  <text x="555" y="376" fill="#8b949e" font-size="12">└── dev/         # Dev machine</text>

  <!-- Restore arrow (bottom) -->
  <path d="M 490 350 L 490 430 L 400 430 L 400 400" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="396,405 400,395 404,405" fill="#f0883e"/>
  <text x="445" y="445" fill="#f0883e" font-size="12" text-anchor="middle">Restore: rsync back from VPS</text>

  <!-- Legend -->
  <rect x="20" y="430" width="380" height="70" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="35" y="452" fill="#c9d1d9" font-size="13" font-weight="bold">Legend</text>
  <rect x="35" y="462" width="12" height="12" fill="#3fb950"/>
  <text x="55" y="473" fill="#8b949e" font-size="11">Backup data (rsync over SSH)</text>
  <rect x="200" y="462" width="12" height="12" fill="#f0883e"/>
  <text x="220" y="473" fill="#8b949e" font-size="11">Restore data</text>
  <rect x="35" y="482" width="12" height="12" fill="#d2a8ff"/>
  <text x="55" y="493" fill="#8b949e" font-size="11">Automation / Multi-server</text>
</svg>
